{% include 'layout.html' %}

<div class="container">
    <div class="card">
        <div class="card-header">
            Todo Details
        </div>
        <div class="card-body">
            <div class="form-group">
                <label><strong>Title</strong></label>
                <p>{{todo.title}}</p>
            </div>
            <div class="form-group">
                <label><strong>Description</strong></label>
                <p>{{todo.description}}</p>
            </div>
            <div class="form-group">
                <label><strong>Priority</strong></label>
                <p>{{todo.priority}}</p>
            </div>
            <div class="form-group">
                <label><strong>Status</strong></label>
                <p>{% if todo.complete %} Complete {% else %} Incomplete {% endif %}</p>
            </div>
            <a href="/todos/edit-todo-page/{{todo.id}}" class="btn btn-info">Edit</a>
            <a href="/todos/todo-page" class="btn btn-success">Back</a>
        </div>
    </div>
</div>
